url: https://viniciusoike.github.io/ggconsulting/

template:
  bootstrap: 5

development:
  mode: auto

reference:
- title: Themes
  desc: >
    Composable theme builder and archetype presets.
  contents:
  - ct_theme
  - theme_strategy
  - theme_finance
  - theme_editorial

- title: Scales and palettes
  desc: >
    Discrete and continuous colour/fill scales backed by ggconsulting
    palettes, plus a swatch preview helper.
  contents:
  - ct_scales
  - ct_palette_show

- title: Geom wrappers
  desc: >
    Drop-in replacements for `ggplot2::geom_col()`, `geom_line()`, and
    `geom_point()` with consulting-grade defaults baked in at the call site.
  contents:
  - ct_geoms

- title: Locale and formatters
  desc: >
    Locale-aware number, currency, percentage, and date formatters,
    plus a session-scoped locale switch.
  contents:
  - ct_locale
  - ct_formatters

- title: Defaults
  desc: >
    Aesthetic defaults applied on library attach via
    `ggplot2::update_geom_defaults()`, with an opt-out path.
  contents:
  - ct_defaults
